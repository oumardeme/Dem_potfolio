<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap)" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <nav class="container">
    <a href="index.html" class="logo">Oumar Deme</a>

    <div class="menu-toggle" id="menu-toggle">
      ☰
    </div>

    <ul id="menu">
      <li><a href="index.html" class="active">Accueil</a></li>
      <li><a href="about.html">À propos</a></li>
      <li><a href="projets.html">Projets</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- SECTION CONTACT -->
<section class="contact container">
  <h2>Contactez-moi</h2>

  <form class="contact-form">
    <div class="form-group">
      <label>Nom</label>
      <input type="text" placeholder="Votre nom" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Votre email" required>
    </div>

    <div class="form-group">
      <label>Message</label>
      <textarea placeholder="Votre message..." required></textarea>
    </div>

    <button type="submit" class="btn">Envoyer</button>
  </form>
</section>
<br>
<br>
<br>

<!-- SECTION DEMANDE DE PROJET -->
<section class="contact-form">
  
  <h2>Faire une demande de projet</h2>

  <form class="project-form">
    <div class="form-group">
      <label>Nom complet</label>
      <input type="text" placeholder="Votre nom complet" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Votre adresse email" required>
    </div>

    <div class="form-group">
      <label>Nom du projet</label>
      <input type="text" placeholder="Titre du projet" required>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea placeholder="Décrivez brièvement votre projet..." required></textarea>
    </div>

    

    <button type="submit" class="btn">Soumettre la demande</button>
  </form>
</section>
<br>
<br>
<br>

<!-- SECTION RECHERCHE DE PROJET -->
<section class="contact-form">
  <h2>Rechercher un projet</h2>

  <form class="search-form">
    <div class="form-group">
      <label>Mot-clé</label>
      <input type="text" placeholder="Nom, domaine, ou mot-clé du projet" required>
    </div>

    <div class="form-group">
      <label>Catégorie</label>
      <select required>
        <option value="">Sélectionnez une catégorie</option>
        <option value="web">Développement web</option>
        <option value="design">Design</option>
        <option value="mobile">Application mobile</option>
        <option value="autre">Autre</option>
      </select>
    </div>

    

    <button type="submit" class="btn">Rechercher</button>
  </form>
</section>
<br>
<br>
<br>

<footer>

</footer>

</body>
</html>
